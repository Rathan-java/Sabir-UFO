name: sabir_ufo_mobile
description: Sabir UFO — Sighting Reporting & Research Platform (mobile)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4

  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  http: ^1.2.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
